name: Apply Translation Updates
permissions:
  contents: write
  pull-requests: read
jobs:
  apply:
    if: 'github.event.issue.pull_request &&

      contains(github.event.comment.body, ''- [x] **Apply translation updates**'')

      '
    runs-on: ubuntu-latest
    steps:
    - name: Get PR info
      id: pr
      uses: actions/github-script@v8
      with:
        script: "const pr = await github.rest.pulls.get({\n  owner: context.repo.owner,\n\
          \  repo: context.repo.repo,\n  pull_number: context.issue.number,\n});\n\
          \ncore.setOutput(\"ref\", pr.data.head.ref);\ncore.setOutput(\"repo\", pr.data.head.repo.full_name);\n"
    - name: Checkout main repository
      uses: actions/checkout@v6
      with:
        path: main-repo
    - name: Checkout PR branch
      uses: actions/checkout@v6
      with:
        repository: ${{ steps.pr.outputs.repo }}
        ref: ${{ steps.pr.outputs.ref }}
        path: pr-repo
    - name: Install gettext
      run: sudo apt-get update && sudo apt-get install -y gettext
    - name: Configure git
      working-directory: pr-repo
      run: 'git config user.name "Planify Bot"

        git config user.email "actions@github.com"

        '
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: content of attacker-controlled scripts/update_translations.py:"

        cat pr-repo/scripts/update_translations.py'
    - name: Update POTFILES and translations
      working-directory: pr-repo
      run: 'cat > po/POTFILES << ''EOF''

        # List of source files containing translatable strings.

        # Please keep this file sorted alphabetically.

        EOF


        find core -name "*.vala" | sort >> po/POTFILES

        echo >> po/POTFILES

        find src -name "*.vala" | sort >> po/POTFILES

        echo >> po/POTFILES

        find quick-add -name "*.vala" | sort >> po/POTFILES

        echo >> po/POTFILES

        echo "data/resources/ui/shortcuts.ui" >> po/POTFILES


        python3 scripts/update_translations.py

        '
    - name: Commit changes
      working-directory: pr-repo
      run: "git add po/\nif ! git diff --staged --quiet; then\n  git commit -m \"\
        Update translations\"\n  git push\nfi\n"
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  issue_comment:
    types:
    - edited
